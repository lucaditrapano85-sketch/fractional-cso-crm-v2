<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leva — Accedi</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%231a1a2e'/><rect x='4' y='20' width='24' height='3' rx='1.5' fill='%233D5AFE'/><rect x='13.5' y='5' width='3' height='15' rx='1.5' fill='white'/><circle cx='15' cy='21.5' r='4' fill='white'/><line x1='15' y1='21.5' x2='26' y2='11' stroke='%23FF6B2B' stroke-width='2.5' stroke-linecap='round'/><circle cx='26' cy='11' r='2.5' fill='%23FF6B2B'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0 }
body {
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#d8dbe2;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  -webkit-font-smoothing:antialiased;
}
.login-card {
  background:rgba(255,255,255,0.55);
  border:1px solid rgba(255,255,255,0.7);
  border-radius:22px;
  padding:40px;
  width:100%;
  max-width:400px;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  box-shadow:0 8px 32px rgba(0,0,0,0.08),inset 0 1px 0 rgba(255,255,255,0.8);
}
.login-logo {
  text-align:center;
  margin-bottom:24px;
}
.login-field {
  margin-bottom:12px;
}
.login-field label {
  display:block;
  font-size:11px;
  font-weight:600;
  color:rgba(26,26,46,0.55);
  margin-bottom:5px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.login-field input {
  width:100%;
  padding:12px 14px;
  border:1px solid rgba(0,0,0,0.08);
  border-radius:10px;
  background:rgba(255,255,255,0.5);
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:14px;
  color:#1a1a2e;
  outline:none;
  transition:border-color 0.2s;
}
.login-field input::placeholder { color:rgba(26,26,46,0.35) }
.login-field input:focus { border-color:rgba(61,90,254,0.4) }
.login-btn {
  width:100%;
  padding:12px;
  background:#3D5AFE;
  color:#fff;
  border:none;
  border-radius:10px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  margin-top:8px;
  transition:background 0.2s;
}
.login-btn:hover { background:#2a47e0 }
.login-btn:disabled { opacity:0.5; cursor:not-allowed }
.login-msg {
  font-size:12px;
  text-align:center;
  min-height:18px;
  margin-top:10px;
  color:#E53935;
}
.login-msg.success { color:rgba(0,130,80,0.85) }
.login-toggle {
  text-align:center;
  margin-top:16px;
  font-size:13px;
  color:rgba(26,26,46,0.45);
}
.login-toggle a {
  color:#3D5AFE;
  text-decoration:none;
  font-weight:600;
  cursor:pointer;
}
.login-toggle a:hover { text-decoration:underline }
.login-footer {
  text-align:center;
  margin-top:32px;
  font-size:12px;
  color:rgba(26,26,46,0.35);
}
.form-row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
#register-form { display:none }
/* Selezione ruolo */
.role-selector-label {
  font-size:11px;
  font-weight:600;
  color:rgba(26,26,46,0.55);
  text-transform:uppercase;
  letter-spacing:0.5px;
  margin-bottom:10px;
}
.role-cards {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:20px;
}
.role-card {
  padding:16px 12px;
  border:1.5px solid rgba(0,0,0,0.08);
  border-radius:12px;
  cursor:pointer;
  text-align:center;
  transition:all 0.15s;
  background:rgba(255,255,255,0.5);
  user-select:none;
}
.role-card:hover {
  border-color:rgba(61,90,254,0.35);
  background:rgba(255,255,255,0.75);
}
.role-card.selected {
  border-color:#3D5AFE;
  background:rgba(61,90,254,0.06);
  box-shadow:0 0 0 3px rgba(61,90,254,0.12);
}
.role-card-icon { font-size:24px; margin-bottom:7px; }
.role-card-title { font-size:13px; font-weight:700; color:#1a1a2e; margin-bottom:3px; }
.role-card-desc { font-size:11px; color:rgba(26,26,46,0.55); line-height:1.4; }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <div style="display:flex;flex-direction:column;align-items:center;margin:0 auto 24px;">
      <div style="background:#1a1a2e;border-radius:22px;padding:14px 20px;display:inline-flex;align-items:flex-start;gap:2px;margin-bottom:14px;">
        <svg width="52" height="52" viewBox="8 4 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-top:-1px;flex-shrink:0;"><rect x="8" y="34" width="44" height="4.5" rx="2.25" fill="#3D5AFE"/><rect x="27.5" y="10" width="4.5" height="25" rx="2.25" fill="white"/><circle cx="29.75" cy="36.25" r="6" fill="white"/><line x1="29.75" y1="36.25" x2="47" y2="22" stroke="#FF6B2B" stroke-width="3.5" stroke-linecap="round"/><circle cx="47" cy="22" r="3.5" fill="#FF6B2B"/></svg>
        <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:44px;font-weight:500;color:white;line-height:1;letter-spacing:-1px;">eva</span>
      </div>
      <div style="font-size:14px;color:rgba(26,26,46,0.55);margin-top:8px;">Intelligence Commerciale per PMI</div>
    </div>
  </div>

  <!-- LOGIN FORM -->
  <form id="login-form">
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="nome@azienda.it" required autocomplete="email">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
    </div>
    <button type="submit" class="login-btn" id="login-btn">Accedi</button>
    <div class="login-msg" id="login-msg"></div>
    <div class="login-toggle">Non hai un account? <a onclick="showRegister()">Registrati</a></div>
  </form>

  <!-- REGISTER FORM -->
  <form id="register-form">
    <!-- Selezione ruolo — obbligatoria -->
    <div class="role-selector-label">Sono un…</div>
    <div class="role-cards">
      <div class="role-card" id="role-card-titolare" onclick="selectRole('titolare')">
        <div class="role-card-icon">🏢</div>
        <div class="role-card-title">Titolare</div>
        <div class="role-card-desc">Voglio migliorare la mia azienda</div>
      </div>
      <div class="role-card" id="role-card-cso" onclick="selectRole('cso')">
        <div class="role-card-icon">💼</div>
        <div class="role-card-title">Professionista</div>
        <div class="role-card-desc">Voglio gestire i miei clienti</div>
      </div>
    </div>
    <div class="form-row">
      <div class="login-field">
        <label>Nome</label>
        <input type="text" id="reg-nome" placeholder="Mario" required>
      </div>
      <div class="login-field">
        <label>Cognome</label>
        <input type="text" id="reg-cognome" placeholder="Rossi" required>
      </div>
    </div>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="nome@azienda.it" required autocomplete="email">
    </div>
    <div class="login-field">
      <label>Telefono</label>
      <input type="tel" id="reg-telefono" placeholder="+39 333 1234567">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Minimo 8 caratteri" required autocomplete="new-password" minlength="8">
    </div>
    <div class="login-field">
      <label>Conferma password</label>
      <input type="password" id="reg-password2" placeholder="Ripeti la password" required autocomplete="new-password" minlength="8">
    </div>
    <button type="submit" class="login-btn" id="reg-btn">Crea account</button>
    <div class="login-msg" id="reg-msg"></div>
    <div class="login-toggle">Hai gia un account? <a onclick="showLogin()">Accedi</a></div>
  </form>

  <div class="login-footer">Leva © 2026</div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://glxwvvtdybzkxtobsiin.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdseHd2dnRkeWJ6a3h0b2JzaWluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MzYxNzIsImV4cCI6MjA4OTAxMjE3Mn0.FvL3LTPaHC43WXzWn6Z_eXo3nly_Gz3QvvTT_S2QNIY'
);

// Se gia loggato, vai all'app
(async function() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = '/index.html';
})();

// Selezione ruolo (Fase 2)
var selectedRole = '';
function selectRole(role) {
  selectedRole = role;
  document.getElementById('role-card-titolare').classList.toggle('selected', role === 'titolare');
  document.getElementById('role-card-cso').classList.toggle('selected', role === 'cso');
  // Pulisce eventuale errore ruolo
  var msg = document.getElementById('reg-msg');
  if (msg.textContent.includes('ruolo')) { msg.textContent = ''; msg.className = 'login-msg'; }
}

// Toggle login/register
function showRegister() {
  selectedRole = '';
  document.getElementById('role-card-titolare').classList.remove('selected');
  document.getElementById('role-card-cso').classList.remove('selected');
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('register-form').style.display = 'block';
  document.getElementById('reg-msg').textContent = '';
  document.getElementById('reg-msg').className = 'login-msg';
}
function showLogin() {
  document.getElementById('register-form').style.display = 'none';
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('login-msg').textContent = '';
  document.getElementById('login-msg').className = 'login-msg';
}

// LOGIN — brute force protection
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 5 * 60 * 1000;
let loginAttempts = 0;
let lockoutTimer = null;

function startLockout(btn, msg) {
  btn.disabled = true;
  let remaining = LOCKOUT_MS / 1000;
  msg.className = 'login-msg error';
  lockoutTimer = setInterval(() => {
    remaining--;
    msg.textContent = `Troppi tentativi. Riprova tra ${remaining}s`;
    if (remaining <= 0) {
      clearInterval(lockoutTimer);
      loginAttempts = 0;
      btn.disabled = false;
      btn.textContent = 'Accedi';
      msg.textContent = '';
      msg.className = 'login-msg';
    }
  }, 1000);
}

document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const msg = document.getElementById('login-msg');
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  if (btn.disabled) return;

  btn.disabled = true;
  btn.textContent = 'Accesso in corso...';
  msg.textContent = '';
  msg.className = 'login-msg';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    loginAttempts++;
    if (loginAttempts >= MAX_ATTEMPTS) {
      startLockout(btn, msg);
    } else {
      msg.textContent = `Email o password non validi (${loginAttempts}/${MAX_ATTEMPTS} tentativi)`;
      msg.className = 'login-msg error';
      btn.disabled = false;
      btn.textContent = 'Accedi';
    }
  } else {
    const { data: { user } } = await sb.auth.getUser();
    await sb.from('access_logs').insert({ user_id: user.id, email: user.email, action: 'login' });
    window.location.href = '/index.html';
  }
});

// REGISTRAZIONE
document.getElementById('register-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('reg-btn');
  const msg = document.getElementById('reg-msg');
  const nome = document.getElementById('reg-nome').value.trim();
  const cognome = document.getElementById('reg-cognome').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const telefono = document.getElementById('reg-telefono').value.trim();
  const password = document.getElementById('reg-password').value;
  const password2 = document.getElementById('reg-password2').value;

  msg.textContent = '';
  msg.className = 'login-msg';

  if (!selectedRole) {
    msg.textContent = 'Scegli il tuo ruolo prima di continuare';
    msg.className = 'login-msg error';
    return;
  }
  if (!nome || !cognome) {
    msg.textContent = 'Nome e cognome sono obbligatori';
    msg.className = 'login-msg error';
    return;
  }
  if (password !== password2) {
    msg.textContent = 'Le password non coincidono';
    msg.className = 'login-msg error';
    return;
  }
  if (password.length < 8) {
    msg.textContent = 'La password deve avere almeno 8 caratteri';
    msg.className = 'login-msg error';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Registrazione in corso...';

  const { data, error } = await sb.auth.signUp({
    email,
    password,
    options: {
      data: {
        nome: nome,
        cognome: cognome,
        telefono: telefono,
        nome_completo: nome + ' ' + cognome,
        role: selectedRole
      }
    }
  });

  if (error) {
    msg.textContent = error.message === 'User already registered'
      ? 'Questa email e gia registrata'
      : 'Errore: ' + error.message;
    msg.className = 'login-msg error';
    btn.disabled = false;
    btn.textContent = 'Crea account';
  } else {
    // user_profiles viene creato dal trigger handle_new_user() lato server
    msg.textContent = 'Account creato! Accesso in corso...';
    msg.className = 'login-msg success';
    setTimeout(function() { window.location.href = '/index.html'; }, 1000);
  }
});
</script>
</body>
</html>
