<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leva — Accedi</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='4' y='17' width='24' height='3' rx='1.5' fill='%233D5AFE'/><rect x='14.5' y='5' width='3' height='13' rx='1.5' fill='%231a1a2e'/><circle cx='16' cy='18' r='3.5' fill='%231a1a2e'/><line x1='16' y1='18' x2='26' y2='11' stroke='%233D5AFE' stroke-width='2' stroke-linecap='round'/><circle cx='26' cy='11' r='2' fill='%233D5AFE'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #d8dbe2;
  --white: #111118;
  --gray: #3a3a4a;
  --gray2: #7a7a90;
  --gold: rgba(140,110,50,0.75);
  --gold2: rgba(120,90,40,0.65);
  --border: rgba(0,0,0,0.06);
  --border2: rgba(0,0,0,0.1);
  --red: rgba(180,60,60,0.75);
  --green: rgba(40,130,80,0.75);
}
* { box-sizing:border-box; margin:0; padding:0 }
body {
  font-family:'DM Sans',sans-serif;
  background:linear-gradient(145deg,#d8dbe2 0%,#cfd2da 50%,#d8dbe2 100%);
  color:var(--white);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  -webkit-font-smoothing:antialiased;
}
.login-card {
  background:rgba(255,255,255,0.55);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:40px 36px;
  width:100%;
  max-width:400px;
  backdrop-filter:blur(12px);
  box-shadow:0 4px 24px rgba(0,0,0,0.06);
}
.login-logo {
  text-align:center;
  margin-bottom:28px;
}
.login-logo h1 {
  font-family:'DM Serif Display',serif;
  font-weight:400;
  font-size:22px;
  color:var(--white);
  letter-spacing:-0.5px;
}
.login-logo p {
  font-size:11px;
  color:var(--gray2);
  margin-top:4px;
  text-transform:uppercase;
  letter-spacing:1.5px;
}
.login-field {
  margin-bottom:14px;
}
.login-field label {
  display:block;
  font-size:11px;
  font-weight:600;
  color:var(--gray);
  margin-bottom:5px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}
.login-field input {
  width:100%;
  padding:10px 12px;
  border:1px solid var(--border2);
  border-radius:8px;
  background:rgba(255,255,255,0.6);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  color:var(--white);
  outline:none;
  transition:border-color 0.2s;
}
.login-field input:focus {
  border-color:var(--gold);
}
.login-btn {
  width:100%;
  padding:11px;
  background:#3D5AFE;
  color:#fff;
  border:none;
  border-radius:8px;
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  margin-top:6px;
  transition:opacity 0.2s;
}
.login-btn:hover { opacity:0.85 }
.login-btn:disabled { opacity:0.5; cursor:not-allowed }
.login-msg {
  font-size:12px;
  text-align:center;
  min-height:18px;
  margin-top:10px;
}
.login-msg.error { color:var(--red) }
.login-msg.success { color:var(--green) }
.login-toggle {
  text-align:center;
  margin-top:18px;
  font-size:12px;
  color:var(--gray2);
}
.login-toggle a {
  color:var(--gold);
  text-decoration:none;
  font-weight:600;
  cursor:pointer;
}
.login-toggle a:hover { text-decoration:underline }
.login-footer {
  text-align:center;
  margin-top:20px;
  font-size:10px;
  color:var(--gray2);
}
.form-row {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
#register-form { display:none }
</style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <div style="width:80px;height:80px;background:#1a1a2e;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px"><svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="27" width="36" height="4" rx="2" fill="#3D5AFE"/><rect x="22" y="8" width="4" height="20" rx="2" fill="white"/><circle cx="24" cy="29" r="5" fill="white"/><line x1="24" y1="29" x2="38" y2="18" stroke="#3D5AFE" stroke-width="3" stroke-linecap="round"/><circle cx="38" cy="18" r="3" fill="#3D5AFE"/></svg></div>
    <h1>Leva</h1>
    <p>Intelligence commerciale per PMI</p>
  </div>

  <!-- LOGIN FORM -->
  <form id="login-form">
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="nome@azienda.it" required autocomplete="email">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password">
    </div>
    <button type="submit" class="login-btn" id="login-btn">Accedi</button>
    <div class="login-msg" id="login-msg"></div>
    <div class="login-toggle">Non hai un account? <a onclick="showRegister()">Registrati</a></div>
  </form>

  <!-- REGISTER FORM -->
  <form id="register-form">
    <div class="form-row">
      <div class="login-field">
        <label>Nome</label>
        <input type="text" id="reg-nome" placeholder="Mario" required>
      </div>
      <div class="login-field">
        <label>Cognome</label>
        <input type="text" id="reg-cognome" placeholder="Rossi" required>
      </div>
    </div>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="nome@azienda.it" required autocomplete="email">
    </div>
    <div class="login-field">
      <label>Telefono</label>
      <input type="tel" id="reg-telefono" placeholder="+39 333 1234567">
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Minimo 8 caratteri" required autocomplete="new-password" minlength="8">
    </div>
    <div class="login-field">
      <label>Conferma password</label>
      <input type="password" id="reg-password2" placeholder="Ripeti la password" required autocomplete="new-password" minlength="8">
    </div>
    <button type="submit" class="login-btn" id="reg-btn">Crea account</button>
    <div class="login-msg" id="reg-msg"></div>
    <div class="login-toggle">Hai gia un account? <a onclick="showLogin()">Accedi</a></div>
  </form>

  <div class="login-footer">Powered by Supabase</div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://glxwvvtdybzkxtobsiin.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdseHd2dnRkeWJ6a3h0b2JzaWluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MzYxNzIsImV4cCI6MjA4OTAxMjE3Mn0.FvL3LTPaHC43WXzWn6Z_eXo3nly_Gz3QvvTT_S2QNIY'
);

// Se gia loggato, vai all'app
(async function() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = '/index.html';
})();

// Toggle login/register
function showRegister() {
  document.getElementById('login-form').style.display = 'none';
  document.getElementById('register-form').style.display = 'block';
  document.getElementById('reg-msg').textContent = '';
  document.getElementById('reg-msg').className = 'login-msg';
}
function showLogin() {
  document.getElementById('register-form').style.display = 'none';
  document.getElementById('login-form').style.display = 'block';
  document.getElementById('login-msg').textContent = '';
  document.getElementById('login-msg').className = 'login-msg';
}

// LOGIN
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const msg = document.getElementById('login-msg');
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;

  btn.disabled = true;
  btn.textContent = 'Accesso in corso...';
  msg.textContent = '';
  msg.className = 'login-msg';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    msg.textContent = 'Email o password non validi';
    msg.className = 'login-msg error';
    btn.disabled = false;
    btn.textContent = 'Accedi';
  } else {
    window.location.href = '/index.html';
  }
});

// REGISTRAZIONE
document.getElementById('register-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('reg-btn');
  const msg = document.getElementById('reg-msg');
  const nome = document.getElementById('reg-nome').value.trim();
  const cognome = document.getElementById('reg-cognome').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const telefono = document.getElementById('reg-telefono').value.trim();
  const password = document.getElementById('reg-password').value;
  const password2 = document.getElementById('reg-password2').value;

  msg.textContent = '';
  msg.className = 'login-msg';

  if (!nome || !cognome) {
    msg.textContent = 'Nome e cognome sono obbligatori';
    msg.className = 'login-msg error';
    return;
  }
  if (password !== password2) {
    msg.textContent = 'Le password non coincidono';
    msg.className = 'login-msg error';
    return;
  }
  if (password.length < 8) {
    msg.textContent = 'La password deve avere almeno 8 caratteri';
    msg.className = 'login-msg error';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Registrazione in corso...';

  const { data, error } = await sb.auth.signUp({
    email,
    password,
    options: {
      data: {
        nome: nome,
        cognome: cognome,
        telefono: telefono,
        nome_completo: nome + ' ' + cognome
      }
    }
  });

  if (error) {
    msg.textContent = error.message === 'User already registered'
      ? 'Questa email e gia registrata'
      : 'Errore: ' + error.message;
    msg.className = 'login-msg error';
    btn.disabled = false;
    btn.textContent = 'Crea account';
  } else {
    // Supabase signUp con autoconfirm logga automaticamente
    msg.textContent = 'Account creato! Accesso in corso...';
    msg.className = 'login-msg success';
    setTimeout(function() { window.location.href = '/index.html'; }, 1000);
  }
});
</script>
</body>
</html>
